services:

  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - iot-net

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=datadoghq.com
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_HOSTNAME=iot-lab-host
      - DD_CONTAINER_EXCLUDE=name:datadog-agent
    ports:
      - "8126:8126"
      - "8125:8125/udp"
    networks:
      - iot-net

  simulator:
    build: ./simulator
    depends_on:
      - mqtt
    networks:
      - iot-net

  consumer:
    build: ./consumer
    depends_on:
      - mqtt
      - datadog-agent
    environment:
      - DD_AGENT_HOST=datadog-agent       # ← env no compose, não no código
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=iot-consumer
      - DD_ENV=docker
      - DD_VERSION=1.0.1
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge